<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AgeRun Walkthrough: Message Processing</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="app">
        <header class="topbar">
            <div>
                <div class="eyebrow">AgeRun Walkthrough</div>
                <h1 id="deck-title">Message Processing</h1>
            </div>
            <div class="status-group">
                <button id="menu-button" class="menu-button" type="button" aria-controls="slide-nav" aria-expanded="false">☰ Slides</button>
                <div class="status">
                    <span id="slide-counter">1 / 1</span>
                </div>
            </div>
        </header>

        <main class="slide-shell">
            <aside id="slide-nav" class="sidebar" aria-label="Slide navigation">
                <div class="sidebar-header">
                    <h2 class="sidebar-title">Slides</h2>
                    <button id="sidebar-close" class="sidebar-close" type="button" aria-label="Close slide navigation">×</button>
                </div>
                <nav id="slide-nav-list" class="sidebar-list" aria-label="Slides"></nav>
            </aside>
            <div id="sidebar-backdrop" class="sidebar-backdrop" hidden></div>
            <article class="slide-card">
                <section id="slide"></section>
            </article>
        </main>

        <footer class="controls">
            <button id="prev-button" type="button">← Previous</button>
            <div class="hint">Use ← → or J/K to navigate</div>
            <button id="next-button" type="button">Next →</button>
        </footer>
    </div>

    <script src="slides.js"></script>
</body>
</html>
