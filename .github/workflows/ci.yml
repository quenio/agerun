name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository…
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Install GCC 13 and matching libc
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-13 g++-13 libc6-dev build-essential
          # Ensure gcc-13 can find system headers
          sudo update-alternatives --install /usr/bin/gcc gcc /usr/bin/gcc-13 100
          # Print diagnostic information
          echo "GCC version:"
          gcc-13 --version
          echo "Include paths:"
          gcc-13 -E -Wp,-v -xc /dev/null 2>&1 | grep "^ /"
          echo "Checking for stdio.h:"
          find /usr/include -name stdio.h 2>/dev/null | head -5

      - name: Install Zig 0.14.1
        uses: mlugg/setup-zig@v2
        with:
          version: 0.14.1

      - name: Set CC and CXX
        run: |
          echo "CC=gcc-13" >> $GITHUB_ENV
          echo "CXX=g++-13" >> $GITHUB_ENV
          
      - name: Verify Makefile version
        run: |
          echo "Checking Zig build command in Makefile:"
          grep -n "ZIG.*build-obj" Makefile | head -5

      - name: Full build…
        run: |
          # Use GCC 13 without overriding system include search order.
          # Adding /usr/include through C_INCLUDE_PATH/CPLUS_INCLUDE_PATH breaks
          # libstdc++'s #include_next <stdlib.h> during the vendored llama.cpp build.
          export CC=gcc-13
          export CXX=g++-13
          export LD_LIBRARY_PATH="$PWD/.deps/llama.cpp-install/lib:${LD_LIBRARY_PATH:-}"
          make clean build || BUILD_EXIT=$?; make check-logs || LOGS_EXIT=$?; exit $((BUILD_EXIT + LOGS_EXIT))

      - name: Upload build logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-logs
          path: logs/
          retention-days: 7
