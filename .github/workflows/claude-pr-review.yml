name: Claude PR Review

on:
  pull_request:
    types: [opened, ready_for_review, reopened]

jobs:
  claude-pr-review:
    if: |
      !github.event.pull_request.draft &&
      github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    timeout-minutes: 60
    concurrency:
      group: claude-pr-review-${{ github.event.pull_request.number }}
      cancel-in-progress: true
    permissions:
      contents: read
      pull-requests: write
      issues: write
      actions: read
      id-token: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Run Claude Code Review
        id: claude-review
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          allowed_bots: "claude[bot]"
          plugin_marketplaces: "https://github.com/anthropics/claude-code.git"
          plugins: "code-review@claude-code-plugins"
          prompt: "/code-review:code-review --comment ${{ github.repository }}/pull/${{ github.event.pull_request.number }}"
          claude_args: |
            --allowedTools "Bash(gh pr view:*),Bash(gh pr diff:*),Bash(gh pr comment:*),Bash(gh pr list:*),Bash(gh api:*),mcp__github_inline_comment__create_inline_comment"

      - name: Require Claude review execution
        if: ${{ always() && steps.claude-review.outcome == 'success' && steps.claude-review.outputs.execution_file == '' }}
        run: |
          echo "::error::Claude Code exited successfully without producing execution output."
          echo "::error::This usually means the action skipped before running a review."
          echo "::error::For workflow-validation skips, land the workflow on main first."
          exit 1

      - name: Fail on Claude execution errors
        if: ${{ always() && steps.claude-review.outputs.execution_file != '' }}
        env:
          CLAUDE_EXECUTION_FILE: ${{ steps.claude-review.outputs.execution_file }}
        run: |
          if [ ! -s "$CLAUDE_EXECUTION_FILE" ]; then
            echo "::error::Claude execution file is missing or empty: ${CLAUDE_EXECUTION_FILE}"
            exit 1
          fi

          if jq -e '.. | objects | select(.type? == "result" and .is_error? == true)' "$CLAUDE_EXECUTION_FILE" >/dev/null; then
            error_message=$(jq -r '.. | objects | select(.type? == "result" and .is_error? == true) | .result // "unknown Claude error"' "$CLAUDE_EXECUTION_FILE" | tail -n 1)
            echo "::error::Claude Code reported an error: ${error_message}"
            exit 1
          fi
