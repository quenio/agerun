name: Claude PR Review

on:
  pull_request:
    types: [opened, synchronize, ready_for_review, reopened]

jobs:
  claude-pr-review:
    if: |
      !github.event.pull_request.draft &&
      github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    timeout-minutes: 60
    concurrency:
      group: claude-pr-review-${{ github.event.pull_request.number }}
      cancel-in-progress: true
    permissions:
      contents: read
      pull-requests: write
      issues: write
      actions: read
      id-token: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Run Claude Code Review
        id: claude-review
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          github_token: ${{ github.token }}
          plugin_marketplaces: "https://github.com/anthropics/claude-code.git"
          plugins: "code-review@claude-code-plugins"
          prompt: "/code-review:code-review --comment ${{ github.repository }}/pull/${{ github.event.pull_request.number }}"
          claude_args: |
            --allowedTools "Bash(gh pr view:*),Bash(gh pr diff:*),Bash(gh pr comment:*),Bash(gh pr list:*),Bash(gh api:*),mcp__github_inline_comment__create_inline_comment"
          show_full_output: true

      - name: Fail on Claude execution errors
        if: ${{ always() && steps.claude-review.outputs.execution_file != '' }}
        env:
          CLAUDE_EXECUTION_FILE: ${{ steps.claude-review.outputs.execution_file }}
        run: |
          if jq -e 'select(.type == "result" and .is_error == true)' "$CLAUDE_EXECUTION_FILE" >/dev/null; then
            error_message=$(jq -r 'select(.type == "result" and .is_error == true) | .result // "unknown Claude error"' "$CLAUDE_EXECUTION_FILE" | tail -n 1)
            echo "::error::Claude Code reported an error: ${error_message}"
            exit 1
          fi
