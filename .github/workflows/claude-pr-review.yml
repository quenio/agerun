name: Claude PR Review

on:
  pull_request:
    types: [opened, synchronize, ready_for_review, reopened]

jobs:
  claude-pr-review:
    if: |
      !github.event.pull_request.draft &&
      github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    timeout-minutes: 60
    concurrency:
      group: claude-pr-review-${{ github.event.pull_request.number }}
      cancel-in-progress: true
    permissions:
      contents: read
      pull-requests: write
      issues: write
      actions: read
      id-token: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Record checkout state
        id: checkout-state
        run: echo "head=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

      - name: Capture PR review context
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          REPOSITORY: ${{ github.repository }}
        run: |
          owner="${REPOSITORY%/*}"
          repo="${REPOSITORY#*/}"
          context_dir="$(mktemp -d)"
          top_level_comments_file="${context_dir}/top-level-comments.json"
          reviews_file="${context_dir}/reviews.json"
          review_comments_file="${context_dir}/review-comments.json"

          gh api --paginate --method GET \
            "repos/${owner}/${repo}/issues/${PR_NUMBER}/comments" |
            jq -s 'add // []' > "$top_level_comments_file"
          gh api --paginate --method GET \
            "repos/${owner}/${repo}/pulls/${PR_NUMBER}/reviews" |
            jq -s 'add // []' > "$reviews_file"
          gh api --paginate --method GET \
            "repos/${owner}/${repo}/pulls/${PR_NUMBER}/comments" |
            jq -s 'add // []' > "$review_comments_file"

          page=0
          after=""

          while :; do
            page_file="${context_dir}/page-$(printf "%05d" "$page").json"
            cursor_args=()
            if [ -n "$after" ]; then
              cursor_args=(-F "threadCursor=${after}")
            fi

            gh api graphql \
              -F owner="$owner" \
              -F repo="$repo" \
              -F number="$PR_NUMBER" \
              "${cursor_args[@]}" \
              -f query='
              query(
                $owner: String!
                $repo: String!
                $number: Int!
                $threadCursor: String
              ) {
                repository(owner: $owner, name: $repo) {
                  pullRequest(number: $number) {
                    reviewThreads(first: 100, after: $threadCursor) {
                      pageInfo {
                        endCursor
                        hasNextPage
                      }
                      nodes {
                        isOutdated
                        isResolved
                        line
                        originalLine
                        path
                      }
                    }
                  }
                }
              }
            ' > "$page_file"

            if [ "$(jq -r '.data.repository.pullRequest.reviewThreads.pageInfo.hasNextPage' "$page_file")" != "true" ]; then
              break
            fi

            after="$(jq -r '.data.repository.pullRequest.reviewThreads.pageInfo.endCursor' "$page_file")"
            page=$((page + 1))
          done

          jq -s \
            --arg repository "$REPOSITORY" \
            --argjson pullRequest "$PR_NUMBER" \
            --slurpfile topLevelComments "$top_level_comments_file" \
            --slurpfile reviews "$reviews_file" \
            --slurpfile reviewComments "$review_comments_file" \
            '
            . as $pages
            | {
              repository: $repository,
              pullRequest: $pullRequest,
              topLevelComments: $topLevelComments[0],
              reviews: $reviews[0],
              reviewComments: $reviewComments[0],
              reviewThreads: {
                nodes: ($pages | map(.data.repository.pullRequest.reviewThreads.nodes[])),
                pageInfo: {
                capturedPages: ($pages | length),
                capturedThreadCount: (
                  $pages | map(.data.repository.pullRequest.reviewThreads.nodes[]) | length
                ),
                endCursor: ($pages[-1].data.repository.pullRequest.reviewThreads.pageInfo.endCursor),
                hasNextPage: false
              }
              }
            }
          ' "$context_dir"/page-*.json > /tmp/claude-pr-review-context.json
          rm -rf "$context_dir"

      - name: Run Claude Code Review
        id: claude-review
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          # Temporary diagnostic bypass for workflow-file PRs. Remove after
          # this workflow lands on the default branch.
          github_token: ${{ github.token }}
          allowed_bots: "claude[bot],chatgpt-codex-connector[bot],cursor[bot]"
          settings: |
            {
              "permissions": {
                "allow": [
                  "Read",
                  "Glob",
                  "Grep",
                  "Edit(//tmp/**)",
                  "Write(//tmp/**)",
                  "WebFetch",
                  "WebSearch",
                  "Bash(gh pr view:*)",
                  "Bash(gh pr diff:*)",
                  "Bash(gh pr list:*)",
                  "Bash(gh api graphql:*)",
                  "Bash(gh api --method GET repos/*/*/issues/*/comments:*)",
                  "Bash(gh api --method GET repos/*/*/pulls/*/comments:*)",
                  "Bash(gh api --method GET repos/*/*/pulls/*/reviews:*)",
                  "Bash(git diff:*)",
                  "Bash(git log:*)",
                  "Bash(git show:*)",
                  "Bash(cd:*)",
                  "Bash(cat:*)",
                  "Bash(jq:*)",
                  "Bash(mkdir:*)",
                  "Bash(mktemp:*)",
                  "Bash(rm:*)",
                  "mcp__github_inline_comment__create_inline_comment"
                ],
                "deny": [
                  "MultiEdit",
                  "Edit(//home/runner/work/_temp/_runner_file_commands/**)",
                  "Write(//home/runner/work/_temp/_runner_file_commands/**)",
                  "Bash(*GITHUB_ENV*)",
                  "Bash(*GITHUB_OUTPUT*)",
                  "Bash(*GITHUB_PATH*)",
                  "Bash(*GITHUB_STEP_SUMMARY*)",
                  "Bash(*_runner_file_commands*)",
                  "Bash(git add:*)",
                  "Bash(git commit:*)",
                  "Bash(git push:*)",
                  "Bash(gh auth token:*)",
                  "Bash(gh api graphql *mutation*)",
                  "Bash(gh api graphql *Mutation*)",
                  "Bash(gh api * --method DELETE*)",
                  "Bash(gh api * --method PATCH*)",
                  "Bash(gh api * --method PUT*)",
                  "Bash(gh api * -X DELETE*)",
                  "Bash(gh api * -X PATCH*)",
                  "Bash(gh api * -X PUT*)",
                  "Bash(gh pr merge:*)"
                ]
              }
            }
          prompt: |
            Review ${{ github.repository }}/pull/${{ github.event.pull_request.number }}
            at head ${{ github.event.pull_request.head.sha }}.

            Always review the latest PR diff, even if Claude or another bot has
            already commented on this PR. Do not stop just because prior Claude
            comments exist.

            Before reporting, read /tmp/claude-pr-review-context.json to inspect
            existing PR comments, reviews, and review threads, including
            resolved/outdated state and replies. Do not duplicate findings that
            are already reported, resolved, answered, intentionally accepted, or
            fixed on the current head.

            Use gh pr view and gh pr diff to inspect the PR. Focus on changed
            lines and repository instructions that apply to changed files.
            gh api may be used only for read-only GraphQL queries or pull
            review/comment endpoints when the captured context is insufficient.
            Use --method GET for REST gh api review/comment requests. Do not run
            GraphQL mutations or mutating gh api requests.
            Report only high-confidence bugs, workflow/configuration failures,
            security problems, or clear repository-instruction violations.

            Temporary scratch files are allowed only under /tmp.
            Do not write under the repository checkout, do not commit or push
            changes, do not write to GitHub Actions env/output/path files, and
            do not merge, edit, or mutate the PR through gh.
            WebSearch and WebFetch are allowed when public web research improves
            review accuracy, including fetching references found through
            WebSearch. Do not include secrets, tokens, private command output,
            or bulk repository content in web tool requests.

            For changed-line findings, post inline comments with
            mcp__github_inline_comment__create_inline_comment using confirmed:
            true. If no issues are found, print a short terminal summary and do
            not post a PR comment.
          claude_args: |
            --allowedTools "Read,Glob,Grep,Edit(//tmp/**),Write(//tmp/**),WebFetch,WebSearch,Bash(gh pr view:*),Bash(gh pr diff:*),Bash(gh pr list:*),Bash(gh api graphql:*),Bash(gh api --method GET repos/*/*/issues/*/comments:*),Bash(gh api --method GET repos/*/*/pulls/*/comments:*),Bash(gh api --method GET repos/*/*/pulls/*/reviews:*),Bash(git diff:*),Bash(git log:*),Bash(git show:*),Bash(cd:*),Bash(cat:*),Bash(jq:*),Bash(mkdir:*),Bash(mktemp:*),Bash(rm:*),mcp__github_inline_comment__create_inline_comment"
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Require clean repository after Claude review
        if: ${{ always() }}
        env:
          CHECKOUT_HEAD: ${{ steps.checkout-state.outputs.head }}
        run: |
          if [ -z "$CHECKOUT_HEAD" ]; then
            echo "::error::Recorded checkout HEAD is missing; cannot verify Claude review left HEAD unchanged."
            exit 1
          fi

          current_head=$(git rev-parse HEAD)
          if [ "$current_head" != "$CHECKOUT_HEAD" ]; then
            echo "::error::Claude review changed HEAD from ${CHECKOUT_HEAD} to ${current_head}."
            exit 1
          fi

          if [ -n "$(git status --porcelain)" ]; then
            echo "::error::Claude review left repository changes in the checkout."
            git status --short
            exit 1
          fi

      - name: Require Claude review execution
        if: ${{ always() && steps.claude-review.outcome == 'success' && steps.claude-review.outputs.execution_file == '' }}
        run: |
          echo "::error::Claude Code exited successfully without producing execution output."
          echo "::error::This usually means the action skipped before running a review."
          echo "::error::For workflow-validation skips, land the workflow on main first."
          exit 1

      - name: Fail on Claude execution errors or denials
        if: ${{ always() && steps.claude-review.outputs.execution_file != '' }}
        env:
          CLAUDE_EXECUTION_FILE: ${{ steps.claude-review.outputs.execution_file }}
        run: |
          if [ ! -s "$CLAUDE_EXECUTION_FILE" ]; then
            echo "::error::Claude execution file is missing or empty: ${CLAUDE_EXECUTION_FILE}"
            exit 1
          fi

          if jq -s -e '.[] | .. | objects | select(.type? == "result" and .is_error? == true)' "$CLAUDE_EXECUTION_FILE" >/dev/null; then
            error_message=$(jq -s -r '[.[] | .. | objects | select(.type? == "result" and .is_error? == true) | (.result // "unknown Claude error")] | last' "$CLAUDE_EXECUTION_FILE")
            echo "::error::Claude Code reported an error: ${error_message}"
            exit 1
          fi

          permission_denials_count=$(
            jq -s -r '[.[] | .. | objects | select(.type? == "result") | (.permission_denials? // [])[]] | length' "$CLAUDE_EXECUTION_FILE"
          )
          if [ -n "$permission_denials_count" ] && [ "$permission_denials_count" != "0" ]; then
            denied_tools=$(jq -s -r '[.[] | .. | objects | select(.type? == "result") | (.permission_denials? // [])[]?.tool_name] | unique | join(", ")' "$CLAUDE_EXECUTION_FILE")
            echo "::error::Claude Code reported ${permission_denials_count} permission denials."
            if [ -n "$denied_tools" ]; then
              echo "::error::Denied tools: ${denied_tools}"
            fi
            echo "::error::Review output may be missing or incomplete until the tool allowlist is updated."
            exit 1
          fi
