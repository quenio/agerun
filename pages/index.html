<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AgeRun Pages</title>
    <style>
        :root {
            color-scheme: dark;
            --bg: #0b1020;
            --panel: #121933;
            --text: #eef2ff;
            --muted: #a7b0d6;
            --accent: #7dd3fc;
            --border: rgba(255, 255, 255, 0.12);
        }

        * { box-sizing: border-box; }

        body {
            margin: 0;
            min-height: 100vh;
            font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            background: radial-gradient(circle at top, #18244b 0%, var(--bg) 55%);
            color: var(--text);
        }

        main {
            width: min(900px, calc(100vw - 32px));
            margin: 0 auto;
            padding: 48px 0;
        }

        .panel {
            background: rgba(18, 25, 51, 0.9);
            border: 1px solid var(--border);
            border-radius: 18px;
            padding: 28px;
        }

        .eyebrow {
            text-transform: uppercase;
            letter-spacing: 0.08em;
            font-size: 0.8rem;
            color: var(--accent);
            margin-bottom: 8px;
        }

        h1 { margin: 0 0 12px; }
        p { color: var(--muted); }

        ul { padding-left: 22px; }
        li { margin: 0 0 10px; }

        a {
            color: var(--accent);
            text-decoration: none;
        }

        a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <main>
        <section class="panel">
            <div class="eyebrow">AgeRun GitHub Pages</div>
            <h1>Walkthroughs</h1>
            <p>This site hosts static HTML/JS walkthrough decks for exploring AgeRun architecture and runtime behavior.</p>
            <ul>
                <li><a href="walkthroughs/agent-lifecycle/index.html">Agent Lifecycle</a></li>
            </ul>
            <p>Repository documentation lives in the main project tree; the walkthrough content published here is the browser-rendered companion.</p>
        </section>
    </main>
</body>
</html>
