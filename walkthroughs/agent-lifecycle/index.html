<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AgeRun Walkthrough: Agent Lifecycle</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="app">
        <header class="topbar">
            <div>
                <div class="eyebrow">AgeRun Walkthrough</div>
                <h1 id="deck-title">Agent Lifecycle</h1>
            </div>
            <div class="status">
                <span id="slide-counter">1 / 1</span>
            </div>
        </header>

        <main class="slide-shell">
            <article class="slide-card">
                <section id="slide"></section>
            </article>
        </main>

        <footer class="controls">
            <button id="prev-button" type="button">← Previous</button>
            <div class="hint">Use ← → or J/K to navigate</div>
            <button id="next-button" type="button">Next →</button>
        </footer>
    </div>

    <script src="slides.js"></script>
</body>
</html>
